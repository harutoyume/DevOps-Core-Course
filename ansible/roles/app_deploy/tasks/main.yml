---
# Application deployment role tasks

- name: Log in to Docker Hub
  community.docker.docker_login:
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
    registry_url: https://index.docker.io/v1/
    state: present
  no_log: true

- name: Pull Docker image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_image_tag }}"
    source: pull
    force_source: yes

- name: Remove old container if exists
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent
  ignore_errors: yes

- name: Run application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    state: started
    restart_policy: "{{ app_container_restart_policy }}"
    published_ports:
      - "{{ app_port }}:{{ app_port }}"
    env:
      PORT: "{{ app_port | string }}"

- name: Wait for application port to be available
  wait_for:
    port: "{{ app_port }}"
    host: localhost
    timeout: "{{ app_health_check_timeout }}"
    delay: 2

- name: Verify application health endpoint
  uri:
    url: "http://localhost:{{ app_port }}{{ app_health_endpoint }}"
    method: GET
    status_code: 200
    timeout: 10
  retries: 3
  delay: 2
