---
# Common role tasks - system provisioning

- name: Package installation with error handling
  block:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install common packages
      apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Fix apt cache on failure
      command: apt-get update --fix-missing
      changed_when: true

    - name: Retry package installation
      apt:
        name: "{{ common_packages }}"
        state: present

  always:
    - name: Log package installation completion
      copy:
        content: "Common packages setup completed successfully\n"
        dest: /tmp/common_setup.log
        mode: '0644'

  become: true
  tags:
    - packages

- name: System configuration
  block:
    - name: Set timezone
      timezone:
        name: "{{ timezone }}"

  become: true
  tags:
    - config
