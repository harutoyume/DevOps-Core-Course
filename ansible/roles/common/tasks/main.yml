---
# Common role tasks - system provisioning

- name: Package installation with error handling
  become: true
  tags:
    - packages
  block:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install common packages
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

  rescue:
    - name: Fix apt cache on failure
      ansible.builtin.apt:
        update_cache: true
        force_apt_get: true

    - name: Retry package installation
      ansible.builtin.apt:
        name: "{{ common_packages }}"
        state: present

  always:
    - name: Log package installation completion
      ansible.builtin.copy:
        content: "Common packages setup completed successfully\n"
        dest: /tmp/common_setup.log
        mode: "0644"

- name: System configuration
  become: true
  tags:
    - config
  block:
    - name: Set timezone
      community.general.timezone:
        name: "{{ common_timezone }}"
