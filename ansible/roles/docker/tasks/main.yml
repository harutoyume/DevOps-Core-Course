---
# Docker role tasks - install Docker CE

- name: Docker installation with error handling
  block:
    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      apt_key:
        url: "{{ docker_apt_gpg_key }}"
        state: present

    - name: Determine Docker architecture
      set_fact:
        docker_arch: "{{ docker_architecture_map[ansible_facts['architecture']] | default('amd64') }}"

    - name: Remove old Docker repository file if it exists
      file:
        path: /etc/apt/sources.list.d/docker.list
        state: absent
      changed_when: false

    - name: Add Docker repository with correct architecture
      apt_repository:
        repo: "deb [arch={{ docker_arch }}] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding Docker repository
      apt:
        update_cache: yes
        cache_valid_time: 0

    - name: Install Docker packages
      apt:
        name: "{{ docker_packages }}"
        state: present
      notify: restart docker

    - name: Install python3-docker for Ansible modules
      apt:
        name: python3-docker
        state: present

  rescue:
    - name: Wait before retry on GPG key failure
      pause:
        seconds: 10

    - name: Retry apt update
      apt:
        update_cache: yes
        cache_valid_time: 0

    - name: Retry Docker package installation
      apt:
        name: "{{ docker_packages }}"
        state: present

  always:
    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

  become: true
  tags:
    - docker_install

- name: Docker configuration
  block:
    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop: "{{ docker_users }}"

    - name: Reset SSH connection to apply group changes
      meta: reset_connection

  become: true
  tags:
    - docker_config
