---
# Docker role tasks - install Docker CE

- name: Docker installation with error handling
  become: true
  tags:
    - docker_install
  block:
    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: true

    - name: Add Docker GPG key
      ansible.builtin.apt_key:
        url: "{{ docker_apt_gpg_key }}"
        state: present

    - name: Determine Docker architecture
      ansible.builtin.set_fact:
        docker_arch: "{{ docker_architecture_map[ansible_facts['architecture']] | default('amd64') }}"

    - name: Remove old Docker repository file if it exists
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/docker.list
        state: absent
      changed_when: false

    - name: Add Docker repository with correct architecture
      ansible.builtin.apt_repository:
        repo: "deb [arch={{ docker_arch }}] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"
        state: present
        filename: docker

    - name: Update apt cache after adding Docker repository
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0

    - name: Install Docker packages
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present
      notify: Restart docker

    - name: Install python3-docker for Ansible modules
      ansible.builtin.apt:
        name: python3-docker
        state: present

  rescue:
    - name: Wait before retry on GPG key failure
      ansible.builtin.pause:
        seconds: 10

    - name: Retry apt update
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 0

    - name: Retry Docker package installation
      ansible.builtin.apt:
        name: "{{ docker_packages }}"
        state: present

  always:
    - name: Ensure Docker service is started and enabled
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

- name: Docker configuration
  become: true
  tags:
    - docker_config
  block:
    - name: Add users to docker group
      ansible.builtin.user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"

    - name: Reset SSH connection to apply group changes
      ansible.builtin.meta: reset_connection
