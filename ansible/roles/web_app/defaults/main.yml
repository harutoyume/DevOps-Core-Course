---
# Default variables for web_app role

# Application Configuration
app_name: devops-app
docker_image: haruyume/devops-info-service
docker_tag: latest
app_port: 5000
app_internal_port: 5000

# Docker Compose Configuration
compose_project_dir: "/opt/{{ app_name }}"
docker_compose_version: "3.8"

# Health Check Configuration
app_health_check_timeout: 30
app_health_endpoint: /health

# Wipe Logic Control - requires both variable AND tag
# Set to true to remove application completely
# Wipe only:    ansible-playbook deploy.yml -e "web_app_wipe=true" --tags web_app_wipe
# Clean install: ansible-playbook deploy.yml -e "web_app_wipe=true"
web_app_wipe: false
