---
# Web application deployment with Docker Compose

# Wipe logic runs first (when explicitly requested)
- name: Include wipe tasks
  include_tasks: wipe.yml
  tags:
    - web_app_wipe

# Deploy application with Docker Compose
- name: Deploy application with Docker Compose
  block:
    - name: Create application directory
      file:
        path: "{{ compose_project_dir }}"
        state: directory
        mode: '0755'

    - name: Template docker-compose file
      template:
        src: docker-compose.yml.j2
        dest: "{{ compose_project_dir }}/docker-compose.yml"
        mode: '0644'

    - name: Log in to Docker Hub
      community.docker.docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"
        registry_url: https://index.docker.io/v1/
        state: present
      no_log: true

    - name: Pull latest Docker image
      community.docker.docker_image:
        name: "{{ docker_image }}"
        tag: "{{ docker_tag }}"
        source: pull
        force_source: yes

    - name: Deploy application with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ compose_project_dir }}"
        state: present
        pull: always

    - name: Wait for application port to be available
      wait_for:
        port: "{{ app_port }}"
        host: localhost
        timeout: "{{ app_health_check_timeout }}"
        delay: 2

    - name: Verify application health endpoint
      uri:
        url: "http://localhost:{{ app_port }}{{ app_health_endpoint }}"
        method: GET
        status_code: 200
        timeout: 10
      retries: 3
      delay: 2

  rescue:
    - name: Log deployment failure
      debug:
        msg: "Deployment failed for {{ app_name }}. Check Docker logs."

    - name: Show Docker Compose logs on failure
      command: docker compose -f {{ compose_project_dir }}/docker-compose.yml logs --tail=50
      register: compose_logs
      ignore_errors: yes

    - name: Display logs
      debug:
        var: compose_logs.stdout_lines
      when: compose_logs is defined

    - name: Fail deployment
      fail:
        msg: "Application deployment failed. See logs above."

  become: true
  tags:
    - app_deploy
    - compose
