---
# Web application deployment with Docker Compose

# Wipe logic runs first (when explicitly requested)
- name: Include wipe tasks
  ansible.builtin.include_tasks: wipe.yml
  tags:
    - web_app_wipe

# Deploy application with Docker Compose
- name: Deploy application with Docker Compose
  become: true
  tags:
    - app_deploy
    - compose
  block:
    - name: Create application directory
      ansible.builtin.file:
        path: "{{ web_app_compose_project_dir }}"
        state: directory
        mode: "0755"

    - name: Template docker-compose file
      ansible.builtin.template:
        src: docker-compose.yml.j2
        dest: "{{ web_app_compose_project_dir }}/docker-compose.yml"
        mode: "0644"

    - name: Log in to Docker Hub
      community.docker.docker_login:
        username: "{{ dockerhub_username }}"
        password: "{{ dockerhub_password }}"
        registry_url: https://index.docker.io/v1/
        state: present
      no_log: true

    - name: Pull latest Docker image
      community.docker.docker_image:
        name: "{{ web_app_docker_image }}"
        tag: "{{ web_app_docker_tag }}"
        source: pull
        force_source: true

    - name: Deploy application with Docker Compose
      community.docker.docker_compose_v2:
        project_src: "{{ web_app_compose_project_dir }}"
        state: present
        pull: always

    - name: Wait for application port to be available
      ansible.builtin.wait_for:
        port: "{{ web_app_port }}"
        host: localhost
        timeout: "{{ web_app_health_check_timeout }}"
        delay: 2

    - name: Verify application health endpoint
      ansible.builtin.uri:
        url: "http://localhost:{{ web_app_port }}{{ web_app_health_endpoint }}"
        method: GET
        status_code: 200
        timeout: 10
      retries: 3
      delay: 2

  rescue:
    - name: Log deployment failure
      ansible.builtin.debug:
        msg: "Deployment failed for {{ web_app_name }}. Check Docker logs."

    - name: Show Docker Compose logs on failure
      ansible.builtin.command: "docker compose -f {{ web_app_compose_project_dir }}/docker-compose.yml logs --tail=50"
      register: web_app_compose_logs
      changed_when: false
      failed_when: false

    - name: Display logs
      ansible.builtin.debug:
        var: web_app_compose_logs.stdout_lines
      when: web_app_compose_logs is defined

    - name: Fail deployment
      ansible.builtin.fail:
        msg: "Application deployment failed. See logs above."
