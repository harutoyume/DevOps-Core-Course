# Lab 16 — Task 2 (Grafana): lightweight StatefulSet in default namespace for
# "Pod Resources" / namespace compute dashboards.
apiVersion: v1
kind: Service
metadata:
  name: lab16-demo-sts
  labels:
    app.kubernetes.io/name: lab16-demo-sts
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: lab16-demo-sts
  ports:
    - port: 80
      name: http
      targetPort: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: lab16-demo-sts
  labels:
    app.kubernetes.io/name: lab16-demo-sts
spec:
  serviceName: lab16-demo-sts
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lab16-demo-sts
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lab16-demo-sts
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
