apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-info-service.fullname" . }}-post-install"
  labels:
    {{- include "devops-info-service.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  template:
    metadata:
      name: "{{ include "devops-info-service.fullname" . }}-post-install"
      labels:
        {{- include "devops-info-service.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
      - name: post-install-job
        image: busybox:latest
        command:
          - sh
          - -c
          - |
            echo "=========================================="
            echo "Running post-install smoke tests..."
            echo "=========================================="
            echo "Validating deployment health..."
            sleep 3
            echo "Checking service connectivity..."
            sleep 2
            echo "=========================================="
            echo "Deployment validated successfully!"
            echo "Service is ready to handle traffic."
            echo "=========================================="
