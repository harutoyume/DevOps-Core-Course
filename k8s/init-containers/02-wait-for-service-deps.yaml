# Lab 16 — Task 3.2: Backend the init container will wait for (DNS must exist).
# Apply this before 03-wait-for-service-pod.yaml.
apiVersion: v1
kind: Service
metadata:
  name: lab16-wait-demo-svc
  labels:
    app.kubernetes.io/name: lab16-wait-demo
spec:
  selector:
    app.kubernetes.io/name: lab16-wait-demo
  ports:
    - name: http
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lab16-wait-demo
  labels:
    app.kubernetes.io/name: lab16-wait-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lab16-wait-demo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lab16-wait-demo
    spec:
      containers:
        - name: nginx
          image: nginx:1.25-alpine
          ports:
            - containerPort: 80
