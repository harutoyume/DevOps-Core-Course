# Grafana Dashboard Provisioning
# Lab 8 - Auto-configure dashboards

apiVersion: 1

providers:
  - name: 'DevOps Dashboards'
    orgId: 1
    folder: 'DevOps'
    folderUid: 'devops'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
