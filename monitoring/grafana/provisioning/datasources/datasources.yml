# Grafana Data Sources Provisioning
# Lab 8 - Auto-configure Prometheus and Loki data sources

apiVersion: 1

datasources:
  # Prometheus data source for metrics
  - name: Prometheus
    type: prometheus
    uid: PBFA97CFB590B2093
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # Loki data source for logs (from Lab 7)
  - name: Loki
    type: loki
    uid: loki-datasource
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
